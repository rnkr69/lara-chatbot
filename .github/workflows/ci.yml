name: CI

on:
  push:
    branches: [main, 'feature/**', 'fix/**', 'hardening/**']
  pull_request:
    branches: [main]

jobs:
  php:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # CI exercises Laravel 12 and 13. Laravel 11 is allowed by the package
        # (see composer.json) but NOT tested here: it reached security-EOL
        # (~Mar 2026) and its whole release line now carries an unpatched
        # advisory, so Composer's `audit.block-insecure` refuses to install it
        # from a clean checkout. See docs/getting-started.md for the L11 caveat.
        #
        # Laravel 13 requires PHP ^8.3 (drops 8.2), so it has no 8.2 leg.
        #
        # Each Laravel line is paired with its matching Testbench major
        # (L12 → Testbench 10, L13 → Testbench 11). Pinning only the illuminate/*
        # constraints is not enough: prism-php/prism requires the full
        # `laravel/framework`, which *replaces* illuminate/contracts, so the
        # Testbench major must be pinned to keep the framework version aligned
        # with the illuminate/* pins.
        include:
          - { php: '8.2', laravel: '^12.0', testbench: '^10.0' }
          - { php: '8.3', laravel: '^12.0', testbench: '^10.0' }
          - { php: '8.4', laravel: '^12.0', testbench: '^10.0' }
          - { php: '8.3', laravel: '^13.0', testbench: '^11.0' }
          - { php: '8.4', laravel: '^13.0', testbench: '^11.0' }
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, sqlite3, pdo_sqlite
          coverage: none

      - name: Pin Laravel + Testbench versions
        run: |
          composer require --no-update --dev \
                           "orchestra/testbench:${{ matrix.testbench }}"
          composer require --no-update \
                           "illuminate/contracts:${{ matrix.laravel }}" \
                           "illuminate/support:${{ matrix.laravel }}"

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ matrix.laravel }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-${{ matrix.laravel }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run Pest
        # --no-coverage: CI installs no coverage driver (coverage: none above).
        # Pest 4 / PHPUnit 12 (pulled on the L13 leg) hard-fails when coverage
        # reports are configured in phpunit.xml but no driver is present, where
        # Pest 3 only warned. The flag keeps every leg driver-independent.
        run: vendor/bin/pest --no-coverage --colors=always

  js:
    name: JS bundle build + tests + token parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Node 22 (LTS as of 2024-10) — Node 20's fetch / Response.json
          # internals require more microtask hops than later versions, which
          # makes jsdom-based tests that drive `await response.json()` chains
          # fragile against fixed-count helpers. Node 22+ behaves like our
          # development baseline (Node 22/24). Bump as new LTS lines stabilise.
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Vitest
        run: npm test

      - name: Build bundles
        # `npm run build` already invokes scripts/check-bundle-size.mjs (gzip cap)
        # and scripts/check-bundle-tokens.mjs (per-bundle REQUIRED + cross-bundle
        # SHARED parity). A failure here is a stale bundle, an oversized bundle,
        # or a cross-bundle protocol drift (the PR-C class of bug).
        run: npm run build

  # Playwright is intentionally NOT in CI yet. It is slow under WSL/runners and
  # the existing 487 vitest cases + Pest suite cover the same protocol surface
  # in isolation. Run manually before tagging a release:
  #
  #   npm run test:e2e
  #
  # See docs/distribution.md for the release checklist.
