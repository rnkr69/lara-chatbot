<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>chatbot · dashboard chart fixture (v2.0 / E7)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="csrf-token" content="test-csrf" />
    <style>
      html, body { margin: 0; padding: 0; height: 100%; }
      body { font-family: system-ui, sans-serif; background: #f5f5f5; }
      #chatbot-dashboard-root { display: flex; height: 100vh; width: 100vw; }
    </style>
    <script>
      // ─────────────────────────────────────────────────────────────────────
      // v2.0 / E7 — fixture mínimo con UN dashboard que contiene UN chart
      // widget. Stub-eamos la API JSON + SSE bulk para que el bundle del
      // dashboard arranque sin Laravel detrás.
      //
      // Dos modos seleccionables por hash:
      //   #default → el bundle registra Chart.js automáticamente.
      //   #host-override → el host registra su propio renderer ANTES del
      //                    bundle; el bundle respeta el override.
      // ─────────────────────────────────────────────────────────────────────
      const rows = [{
        id: 1, slug: 'panel', name: 'Panel', is_default: true,
        layout_version: 1, metadata: null, widget_count: 1,
        created_at: '2026-05-13T08:00:00.000Z', updated_at: '2026-05-13T09:00:00.000Z',
      }];
      const widgets = {
        panel: [{
          id: 11, block_type: 'chart', title: 'Quarterly sales',
          position: { x: 0, y: 0, w: 6, h: 4 },
          snapshot: {
            data: {
              type: 'bar',
              title: 'Quarterly sales',
              labels: ['Q1', 'Q2', 'Q3', 'Q4'],
              datasets: [{ label: 'Revenue', data: [120, 180, 150, 210] }],
            },
            captured_at: '2026-05-13T08:00:00.000Z',
          },
          source: { tool: 'sales_summary', args: {}, page_context_snapshot: null },
          source_signature: 'sig-chart-11',
          // Use 'manual' to skip the on_open SSE bulk refresh — we want to
          // observe the FIRST render with Chart.js, not the post-refresh state.
          refresh_policy: 'manual',
          last_refresh_status: 'fresh',
          last_refresh_error: null,
          last_refreshed_at: '2026-05-13T09:00:00.000Z',
          order_index: 0,
          created_at: '2026-05-13T08:00:00.000Z',
          updated_at: '2026-05-13T09:00:00.000Z',
        }],
      };
      window.__chartFixture = { hostOverrideCalls: 0 };

      function jsonResponse(data, status) {
        return new Response(JSON.stringify({ data }), {
          status: status || 200,
          headers: { 'Content-Type': 'application/json' },
        });
      }
      const _origFetch = window.fetch.bind(window);
      window.fetch = function (input, init) {
        const url = typeof input === 'string' ? input : (input && input.url) || '';
        const method = (init && init.method) || 'GET';
        if (method === 'GET' && /\/chatbot\/dashboards\/?$/.test(url)) {
          return Promise.resolve(jsonResponse(rows));
        }
        const showMatch = url.match(/\/chatbot\/dashboards\/([^/?]+)(?:\?|$)/);
        if (method === 'GET' && showMatch) {
          const slug = showMatch[1];
          const row = rows.find((r) => r.slug === slug);
          if (!row) return Promise.resolve(new Response('not found', { status: 404 }));
          return Promise.resolve(jsonResponse({ ...row, widgets: widgets[slug] || [] }));
        }
        return _origFetch(input, init);
      };

      // ─────────────────────────────────────────────────────────────────────
      // Host override: install a Chatbot global with a fake chart renderer
      // BEFORE the dashboard bundle loads. The bundle should not clobber it.
      // ─────────────────────────────────────────────────────────────────────
      if (location.hash === '#host-override') {
        const renderers = new Map();
        renderers.set('chart', function (data) {
          window.__chartFixture.hostOverrideCalls += 1;
          const el = document.createElement('div');
          el.className = 'block block-chart fake-host-chart-renderer';
          el.dataset.fakeMarker = 'host-wins';
          el.textContent = 'HOST RENDERER: ' + (data.title || 'chart');
          return el;
        });
        window.Chatbot = {
          open(){}, close(){}, toggle(){},
          setPageContext(){}, clearPageContext(){},
          registerTool(){},
          registerBlockRenderer(t, fn){ renderers.set(t, fn); },
          registerNavigator(){},
          setUser(){},
          newChat(){},
          whenReady(){},
          __internal: {
            getTool(){ return undefined; },
            getBlockRenderer(t){ return renderers.get(t); },
            getNavigator(){ return null; },
            getPageContext(){ return {}; },
            getBearer(){ return null; },
            emitOpen(){}, emitClose(){}, emitToggle(){}, emitNewChat(){},
            onOpenRequest(){}, onCloseRequest(){}, onToggleRequest(){}, onNewChatRequest(){},
          },
        };
      }
    </script>
    <script src="/public-build/chatbot-dashboard.js"></script>
  </head>
  <body>
    <div
      id="chatbot-dashboard-root"
      data-dashboards-endpoint="/chatbot/dashboards"
      data-theme="light"
      data-chart-renderer="chartjs"
      data-default-slug="panel"
      data-user-id="42"
    ></div>
  </body>
</html>
