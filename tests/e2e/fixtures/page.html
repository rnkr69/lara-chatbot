<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>chatbot · page-mode fixture (E17)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="csrf-token" content="test-csrf" />
    <style>
      html, body { margin: 0; padding: 0; height: 100%; }
      body { font-family: system-ui, sans-serif; }
      #root { display: flex; height: 100vh; width: 100vw; }
      chatbot-widget { flex: 1; min-width: 0; }
    </style>
    <script>
      // Mock both endpoints the page-mode widget consumes:
      //   - GET /chatbot/conversations (sidebar listing + search)
      //   - GET /chatbot/conversations/:id (would be used if the widget hydrates messages)
      //   - POST /chatbot/stream (SSE — same shape as other fixtures)
      const FIXTURE_CONVERSATIONS = [
        { id: 'cross-tab-77', title: 'Handed-off thread', updated_at: '2026-05-09T10:00:00.000Z' },
        { id: 'other-1', title: 'Another one', updated_at: '2026-05-08T10:00:00.000Z' },
      ];
      const _origFetch = window.fetch.bind(window);
      window.fetch = function (input, init) {
        const url = typeof input === 'string' ? input : (input && input.url) || '';
        const method = (init && init.method) || 'GET';
        if (url.indexOf('/chatbot/stream') !== -1) {
          const body =
            'event: text\n' +
            'data: {"delta":"ok"}\n\n' +
            'event: done\n' +
            'data: {"message_id":1,"usage":{}}\n\n';
          return Promise.resolve(
            new Response(body, { status: 200, headers: { 'Content-Type': 'text/event-stream' } })
          );
        }
        if (url.indexOf('/chatbot/conversations') !== -1 && method === 'DELETE') {
          return Promise.resolve(new Response(null, { status: 204 }));
        }
        if (url.indexOf('/chatbot/conversations') !== -1 && method === 'GET') {
          // Simple ?q= filter for the search test.
          const u = new URL(url, window.location.origin);
          const q = (u.searchParams.get('q') || '').toLowerCase();
          const data = q
            ? FIXTURE_CONVERSATIONS.filter((c) => (c.title || '').toLowerCase().indexOf(q) !== -1)
            : FIXTURE_CONVERSATIONS;
          return Promise.resolve(
            new Response(JSON.stringify({ data }), {
              status: 200,
              headers: { 'Content-Type': 'application/json' },
            })
          );
        }
        return _origFetch(input, init);
      };
    </script>
    <script type="module" src="/public-build/chatbot-widget.js"></script>
  </head>
  <body>
    <div id="root">
      <chatbot-widget
        mode="page"
        data-endpoint="/chatbot/stream"
        data-conversations-endpoint="/chatbot/conversations"
      ></chatbot-widget>
    </div>
  </body>
</html>
